; ==============================
; Asterisk mediador WebRTC <-> SIP
; ==============================

[global]
type=global
user_agent=ZionVoipMediator

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; -------- Ramal WebRTC do CRM --------
[1001]
type=aor
max_contacts=5

[1001]
type=auth
auth_type=userpass
username=1001
password=CHANGE_ME_1001

[1001]
type=endpoint
context=from-internal
disallow=all
allow=opus,ulaw,alaw
aors=1001
auth=1001
webrtc=yes
transport=transport-wss
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
ice_support=yes
media_encryption=dtls
dtls_auto_generate_cert=yes
use_avpf=yes
media_use_received_transport=yes
rtcp_mux=yes

; -------- Trunk SIP legado (cliente/provedor) --------
; Troque os valores abaixo pelo SIP real.

[trunk-aor]
type=aor
contact=sip:187.60.60.161:5060

[trunk-auth]
type=auth
auth_type=userpass
username=5511920835503
password=&8oYR0

[trunk-endpoint]
type=endpoint
transport=transport-udp
context=from-trunk
disallow=all
allow=ulaw,alaw
aors=trunk-aor
outbound_auth=trunk-auth
from_user=5511920835503
from_domain=187.60.60.161
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes

[trunk-identify]
type=identify
endpoint=trunk-endpoint
match=187.60.60.161

; Se seu provedor exigir REGISTER, descomente e ajuste:
;[trunk-registration]
;type=registration
;transport=transport-udp
;outbound_auth=trunk-auth
;server_uri=sip:PROVIDER_IP_OR_HOST
;client_uri=sip:PROVIDER_USERNAME@PROVIDER_IP_OR_HOST
;contact_user=PROVIDER_USERNAME
;retry_interval=60
;forbidden_retry_interval=300
;expiration=300
