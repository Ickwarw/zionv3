[general]
static=yes
writeprotect=no

[from-internal]
; Qualquer número discado no frontend sai para o trunk SIP
exten => _X.,1,NoOp(Outbound from WebRTC to trunk: ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@trunk-endpoint,60)
 same => n,Hangup()

[from-trunk]
; Entrante do trunk toca no ramal WebRTC 1001
exten => _X.,1,NoOp(Inbound from trunk to WebRTC 1001)
 same => n,Dial(PJSIP/1001,45)
 same => n,Hangup()
