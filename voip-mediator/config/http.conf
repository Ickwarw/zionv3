[general]
enabled=yes
bindaddr=0.0.0.0
bindport=8088

; WSS obrigatório para navegador
tlsenable=yes
tlsbindaddr=0.0.0.0:8089
tlscertfile=/etc/asterisk/keys/fullchain.pem
tlsprivatekey=/etc/asterisk/keys/privkey.pem

; Melhor compatibilidade com browsers modernos
tlsclientmethod=tlsv1_2

; Endpoint websocket padrão do Asterisk: /ws
