<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zion CRM - Sistema de Gerenciamento</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 2px solid #ddd;
            overflow-x: auto;
        }

        .tab {
            padding: 15px 25px;
            cursor: pointer;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .tab:hover {
            background: #e0e0e0;
        }

        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .content {
            padding: 30px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .actions {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #51cf66;
            color: white;
        }

        .btn-success:hover {
            background: #40c057;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #fa5252;
        }

        .btn-warning {
            background: #ffa94d;
            color: white;
        }

        .btn-warning:hover {
            background: #ff922b;
        }

        .btn-info {
            background: #339af0;
            color: white;
        }

        .btn-info:hover {
            background: #228be6;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #495057;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-ativo {
            background: #d3f9d8;
            color: #2f9e44;
        }

        .status-inativo {
            background: #ffe3e3;
            color: #c92a2a;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            animation: fadeIn 0.3s;
        }

        .modal-content {
            background: white;
            margin: 50px auto;
            padding: 30px;
            border-radius: 10px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }

        .modal-header h2 {
            color: #667eea;
        }

        .close {
            font-size: 28px;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
            border: none;
            background: none;
        }

        .close:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #495057;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 18px;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .error-message {
            background: #ffe3e3;
            color: #c92a2a;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #c92a2a;
        }

        .success-message {
            background: #d3f9d8;
            color: #2f9e44;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #2f9e44;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            padding: 20px 0;
        }

        .pagination button {
            padding: 8px 16px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        .pagination button:hover:not(:disabled) {
            background: #667eea;
            color: white;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination span {
            font-weight: 600;
            color: #495057;
        }

        .action-buttons {
            display: flex;
            gap: 5px;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-card h3 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .stat-card p {
            opacity: 0.9;
            font-size: 0.9em;
        }

        /* Badges de prioridade */
        .priority-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .priority-Queimando { background: #ff0000; color: white; }
        .priority-MuitoQuente { background: #ff4500; color: white; }
        .priority-Quente { background: #ff6b35; color: white; }
        .priority-Morna { background: #ffa500; color: white; }
        .priority-Fria { background: #87ceeb; color: #333; }
        .priority-Ruim { background: #808080; color: white; }
        .priority-NovaLead { background: #90ee90; color: #333; }

        /* Badges de departamento */
        .dept-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .dept-vendas { background: #4facfe; color: white; }
        .dept-pos_venda { background: #43e97b; color: white; }

        /* Badges de contentamento */
        .content-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .content-Excelente { background: #2ecc71; color: white; }
        .content-Bom { background: #27ae60; color: white; }
        .content-Regular { background: #f39c12; color: white; }
        .content-Ruim { background: #e74c3c; color: white; }
        .content-Pessimo { background: #c0392b; color: white; }

        /* Score display */
        .score-display {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 12px;
        }

        .score-high { background: #d4edda; color: #155724; }
        .score-medium { background: #fff3cd; color: #856404; }
        .score-low { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Zion CRM</h1>
            <p>Sistema de Gerenciamento de Leads, Contratos e Suporte</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('leads')">👥 Leads</button>
            <button class="tab" onclick="switchTab('contratos')">📄 Contratos</button>
            <button class="tab" onclick="switchTab('arquivos')">📁 Arquivos</button>
            <button class="tab" onclick="switchTab('chamados')">🎫 Chamados</button>
            <button class="tab" onclick="switchTab('mensagens')">💬 Mensagens</button>
            <button class="tab" onclick="switchTab('usuarios')">👤 Usuários</button>
        </div>

        <div class="content">
            <!-- TAB: LEADS -->
            <div id="tab-leads" class="tab-content active">
                <div class="stats-grid" id="leads-stats"></div>
                
                <div class="actions">
                    <button class="btn btn-primary" onclick="openLeadModal()">➕ Novo Lead</button>
                    <button class="btn btn-info" onclick="classifyAllLeads()" title="Classificar todas as leads automaticamente">🎯 Classificar Todas</button>
                    <div class="search-box">
                        <input type="text" id="search-leads" placeholder="Buscar leads..." 
                               onkeyup="searchLeads()">
                    </div>
                    <button class="btn btn-success" onclick="loadLeads()">🔄 Atualizar</button>
                </div>

                <div id="leads-container">
                    <div class="loading">Carregando leads</div>
                </div>

                <div class="pagination" id="leads-pagination"></div>
            </div>

            <!-- TAB: CONTRATOS -->
            <div id="tab-contratos" class="tab-content">
                <div class="actions">
                    <button class="btn btn-primary" onclick="openContratoModal()">➕ Novo Contrato</button>
                    <button class="btn btn-success" onclick="loadContratos()">🔄 Atualizar</button>
                </div>

                <div id="contratos-container">
                    <div class="loading">Carregando contratos</div>
                </div>
            </div>

            <!-- TAB: ARQUIVOS -->
            <div id="tab-arquivos" class="tab-content">
                <div class="actions">
                    <button class="btn btn-primary" onclick="openArquivoModal()">➕ Novo Arquivo</button>
                    <button class="btn btn-success" onclick="loadArquivos()">🔄 Atualizar</button>
                </div>

                <div id="arquivos-container">
                    <div class="loading">Carregando arquivos</div>
                </div>
            </div>

            <!-- TAB: CHAMADOS -->
            <div id="tab-chamados" class="tab-content">
                <div class="stats-grid" id="chamados-stats"></div>
                
                <div class="actions">
                    <button class="btn btn-primary" onclick="openChamadoModal()">➕ Novo Chamado</button>
                    <button class="btn btn-success" onclick="loadChamados()">🔄 Atualizar</button>
                </div>

                <div id="chamados-container">
                    <div class="loading">Carregando chamados</div>
                </div>
            </div>

            <!-- TAB: MENSAGENS -->
            <div id="tab-mensagens" class="tab-content">
                <div class="actions">
                    <input type="number" id="filter-chamado-id" placeholder="ID do Chamado" 
                           style="padding: 10px; border: 2px solid #ddd; border-radius: 5px;">
                    <button class="btn btn-primary" onclick="loadMensagens()">🔍 Buscar Mensagens</button>
                    <button class="btn btn-success" onclick="openMensagemModal()">➕ Nova Mensagem</button>
                </div>

                <div id="mensagens-container">
                    <p style="text-align: center; color: #666; padding: 40px;">
                        Digite o ID de um chamado e clique em "Buscar Mensagens"
                    </p>
                </div>
            </div>

            <!-- TAB: USUÁRIOS -->
            <div id="tab-usuarios" class="tab-content">
                <div class="actions">
                    <button class="btn btn-primary" onclick="openUsuarioModal()">➕ Novo Usuário</button>
                    <button class="btn btn-success" onclick="loadUsuarios()">🔄 Atualizar</button>
                </div>

                <div id="usuarios-container">
                    <div class="loading">Carregando usuários</div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL GENÉRICO -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Título</h2>
                <button class="close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        // URLs das APIs
        const API_LEADS = 'http://localhost:5001/api';
        const API_ATTRIBUTES = 'http://localhost:5002/api';
        const API_INFOS = 'http://localhost:5003/api';

        let currentPage = 1;
        let currentLeadId = null;
        let currentChamadoId = null;

        // ============================================
        // FUNÇÕES GERAIS
        // ============================================

        function switchTab(tabName) {
            // Remove active de todas as tabs
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            // Ativa tab selecionada
            event.target.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');

            // Carrega dados se necessário
            if (tabName === 'leads') loadLeads();
            if (tabName === 'contratos') loadContratos();
            if (tabName === 'arquivos') loadArquivos();
            if (tabName === 'chamados') loadChamados();
            if (tabName === 'usuarios') loadUsuarios();
        }

        function openModal(title) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('modal-body').innerHTML = '';
        }

        function showMessage(message, type = 'success') {
            const className = type === 'success' ? 'success-message' : 'error-message';
            const div = document.createElement('div');
            div.className = className;
            div.textContent = message;
            
            const container = document.querySelector('.tab-content.active');
            container.insertBefore(div, container.firstChild);
            
            setTimeout(() => div.remove(), 5000);
        }

        // ============================================
        // LEADS
        // ============================================

        async function loadLeads(page = 1) {
            try {
                currentPage = page;
                const response = await fetch(`${API_LEADS}/leads?page=${page}&per_page=20`);
                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error);
                }

                displayLeads(data.data);
                displayPagination(data.pagination, 'leads');
                loadLeadsStats();

            } catch (error) {
                document.getElementById('leads-container').innerHTML = 
                    `<div class="error-message">Erro ao carregar leads: ${error.message}</div>`;
            }
        }

        function displayLeads(leads) {
            function getPriorityBadge(prioridade) {
                if (!prioridade) return '-';
                return `<span class="priority-badge priority-${prioridade}">${prioridade}</span>`;
            }

            function getDeptBadge(dept) {
                if (!dept) return '-';
                const label = dept === 'vendas' ? 'Vendas' : 'Pós-Venda';
                return `<span class="dept-badge dept-${dept}">${label}</span>`;
            }

            function getScoreBadge(score) {
                if (!score || score === 0) return '-';
                const cssClass = score >= 70 ? 'score-high' : score >= 40 ? 'score-medium' : 'score-low';
                return `<span class="score-display ${cssClass}">${score}</span>`;
            }

            const html = `
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Razão Social</th>
                                <th>CPF/CNPJ</th>
                                <th>Email</th>
                                <th>Telefone</th>
                                <th>Cidade</th>
                                <th>Prioridade</th>
                                <th>Departamento</th>
                                <th>Score</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${leads.map(lead => `
                                <tr>
                                    <td>${lead.id}</td>
                                    <td>${lead.razao || '-'}</td>
                                    <td>${lead.cnpj_cpf || '-'}</td>
                                    <td>${lead.email || '-'}</td>
                                    <td>${lead.telefone_celular || lead.fone || '-'}</td>
                                    <td>${lead.cidade || '-'} / ${lead.uf || '-'}</td>
                                    <td>${getPriorityBadge(lead.prioridade)}</td>
                                    <td>${getDeptBadge(lead.departamento)}</td>
                                    <td>${getScoreBadge(lead.score)}</td>
                                    <td>
                                        <span class="status-badge ${lead.ativo === 'S' ? 'status-ativo' : 'status-inativo'}">
                                            ${lead.ativo === 'S' ? 'Ativo' : 'Inativo'}
                                        </span>
                                    </td>
                                    <td class="action-buttons">
                                        <button class="btn btn-warning btn-sm" onclick="editLead(${lead.id})">✏️ Editar</button>
                                        <button class="btn btn-info btn-sm" onclick="classifyLead(${lead.id})" title="Classificar automaticamente">🎯 Classificar</button>
                                        <button class="btn btn-danger btn-sm" onclick="deleteLead(${lead.id})">🗑️ Deletar</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;

            document.getElementById('leads-container').innerHTML = html;
        }

        async function loadLeadsStats() {
            try {
                // Tenta carregar estatísticas avançadas primeiro
                let response = await fetch(`${API_LEADS}/leads/stats/advanced`);
                let data = await response.json();

                if (data.success && data.data) {
                    const stats = data.data;
                    
                    // Grid de estatísticas principais
                    let statsHtml = `
                        <div class="stat-card">
                            <h3>${stats.total || 0}</h3>
                            <p>Total de Leads</p>
                        </div>
                        <div class="stat-card">
                            <h3>${stats.leads_quentes || 0}</h3>
                            <p>Leads Quentes 🔥</p>
                        </div>
                        <div class="stat-card">
                            <h3>${stats.score_medio || 0}</h3>
                            <p>Score Médio</p>
                        </div>
                    `;

                    // Adiciona cards por departamento
                    if (stats.por_departamento && stats.por_departamento.length > 0) {
                        stats.por_departamento.forEach(dept => {
                            const label = dept.departamento === 'vendas' ? 'Vendas' : 'Pós-Venda';
                            statsHtml += `
                                <div class="stat-card">
                                    <h3>${dept.total}</h3>
                                    <p>${label}</p>
                                </div>
                            `;
                        });
                    }

                    document.getElementById('leads-stats').innerHTML = statsHtml;
                    
                } else {
                    // Fallback para estatísticas simples
                    response = await fetch(`${API_LEADS}/leads/stats`);
                    data = await response.json();

                    if (data.success) {
                        const stats = data.data;
                        document.getElementById('leads-stats').innerHTML = `
                            <div class="stat-card">
                                <h3>${stats.total}</h3>
                                <p>Total de Leads</p>
                            </div>
                            <div class="stat-card">
                                <h3>${stats.ativos}</h3>
                                <p>Leads Ativos</p>
                            </div>
                            <div class="stat-card">
                                <h3>${stats.inativos}</h3>
                                <p>Leads Inativos</p>
                            </div>
                            <div class="stat-card">
                                <h3>${stats.cadastros_ultimos_7_dias}</h3>
                                <p>Novos (7 dias)</p>
                            </div>
                        `;
                    }
                }
            } catch (error) {
                console.error('Erro ao carregar estatísticas:', error);
            }
        }

        function searchLeads() {
            const search = document.getElementById('search-leads').value;
            if (search.length >= 3 || search.length === 0) {
                fetch(`${API_LEADS}/leads?search=${search}`)
                    .then(r => r.json())
                    .then(data => displayLeads(data.data));
            }
        }

        async function openLeadModal(leadId = null) {
            openModal(leadId ? 'Editar Lead' : 'Novo Lead');
            
            let leadData = null;
            if (leadId) {
                try {
                    const response = await fetch(`${API_LEADS}/leads/${leadId}`);
                    const result = await response.json();
                    if (result.success) {
                        leadData = result.data;
                    }
                } catch (error) {
                    showMessage('Erro ao carregar lead: ' + error.message, 'error');
                    return;
                }
            }
            
            const form = `
                <form id="lead-form" onsubmit="saveLead(event, ${leadId})">
                    <input type="hidden" name="id" value="${leadId || ''}">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Razão Social *</label>
                            <input type="text" name="razao" value="${leadData?.razao || ''}" required>
                        </div>
                        <div class="form-group">
                            <label>Nome Fantasia</label>
                            <input type="text" name="fantasia" value="${leadData?.fantasia || ''}">
                        </div>

        async function saveLead(event, leadId = null) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            
            // Remove o campo id antes de enviar
            delete data.id;

            try {
                const url = leadId ? `${API_LEADS}/leads/${leadId}` : `${API_LEADS}/leads`;
                const method = leadId ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    showMessage(leadId ? 'Lead atualizado com sucesso!' : 'Lead criado com sucesso!');
                    closeModal();
                    loadLeads();
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                showMessage('Erro ao salvar lead: ' + error.message, 'error');
            }
        }

        async function deleteLead(id) {
            if (!confirm('Deseja realmente deletar este lead?')) return;

            try {
                const response = await fetch(`${API_LEADS}/leads/${id}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('Lead deletado com sucesso!');

                } else {

        }

        async function classifyLead(id) {
            if (!confirm('Deseja classificar automaticamente esta lead com base no status do contrato?')) return;

            try {
                showMessage('Classificando lead...', 'info');
                
                const response = await fetch(`${API_ATTRIBUTES}/leads/classify/${id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                });

                const result = await response.json();

                if (result.success) {
                    const classification = result.data;
                    let message = `Lead classificada com sucesso!\n`;
                    message += `Departamento: ${classification.departamento}\n`;
                    message += `Prioridade: ${classification.prioridade}\n`;
                    if (classification.status_vendas) {
                        message += `Status Vendas: ${classification.status_vendas}\n`;
                    }
                    if (classification.status_pos_venda) {
                        message += `Status Pós-Venda: ${classification.status_pos_venda}\n`;
                    }
                    showMessage(message.replace(/\n/g, ' | '));
                    loadLeads();
                    loadLeadsStats();
                } else {
                    throw new Error(result.error || 'Erro ao classificar lead');
                }
            } catch (error) {
                showMessage('Erro ao classificar lead: ' + error.message, 'error');
            }
        }

                    </div>
                    <div class="form-group">
                        <label>Descrição *</label>
                        <textarea name="descricao" rows="4" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Prioridade</label>
                        <select name="prioridade">
                            <option value="B">Baixa</option>
                            <option value="M">Média</option>
                            <option value="A">Alta</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        ➕ Abrir Chamado
                    </button>
                </form>
            `;
        }

        async function saveChamado(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData);

            try {
                const response = await fetch(`${API_INFOS}/chamados`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('Chamado criado!');
                    closeModal();
                    loadChamados();
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                showMessage('Erro: ' + error.message, 'error');
            }
        }

        async function deleteChamado(id) {
            if (!confirm('Deletar chamado?')) return;

            try {
                const response = await fetch(`${API_INFOS}/chamados/${id}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('Chamado deletado!');
                    loadChamados();
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                showMessage('Erro: ' + error.message, 'error');
            }
        }

        // ============================================
        // MENSAGENS
        // ============================================

        async function loadMensagens() {
            const chamadoId = document.getElementById('filter-chamado-id').value;
            
            if (!chamadoId) {
                showMessage('Digite um ID de chamado', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_INFOS}/chamados-mensagens?id_chamado=${chamadoId}`);
                const data = await response.json();

                if (!data.success) throw new Error(data.error);

                const html = `
                    <div style="max-width: 800px; margin: 20px auto;">
                        ${data.data.map(m => `
                            <div style="background: #f8f9fa; padding: 15px; margin: 10px 0; border-radius: 8px; 
                                        border-left: 4px solid #667eea;">
                                <div style="font-weight: 600; margin-bottom: 5px;">
                                    ${m.tipo_remetente || 'Usuário'} - 
                                    ${new Date(m.data_mensagem).toLocaleString('pt-BR')}
                                </div>
                                <div>${m.mensagem}</div>
                            </div>
                        `).join('')}
                    </div>
                `;

                document.getElementById('mensagens-container').innerHTML = html;
                currentChamadoId = chamadoId;

            } catch (error) {
                document.getElementById('mensagens-container').innerHTML = 
                    `<div class="error-message">Erro: ${error.message}</div>`;
            }
        }

        function openMensagemModal() {
            if (!currentChamadoId) {
                showMessage('Primeiro busque as mensagens de um chamado', 'error');
                return;
            }

            openModal('Nova Mensagem');
            document.getElementById('modal-body').innerHTML = `
                <form onsubmit="saveMensagem(event)">
                    <input type="hidden" name="id_chamado" value="${currentChamadoId}">
                    <div class="form-group">
                        <label>Mensagem *</label>
                        <textarea name="mensagem" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        ➕ Enviar Mensagem
                    </button>
                </form>
            `;
        }

        async function saveMensagem(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData);

            try {
                const response = await fetch(`${API_INFOS}/chamados-mensagens`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('Mensagem enviada!');
                    closeModal();
                    loadMensagens();
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                showMessage('Erro: ' + error.message, 'error');
            }
        }

        // ============================================
        // USUÁRIOS
        // ============================================

        async function loadUsuarios() {
            try {
                const response = await fetch(`${API_INFOS}/usuarios`);
                const data = await response.json();

                if (!data.success) throw new Error(data.error);

                const html = `
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Login</th>
                                    <th>Nome</th>
                                    <th>Email</th>
                                    <th>Tipo</th>
                                    <th>Status</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.data.map(u => `
                                    <tr>
                                        <td>${u.id}</td>
                                        <td>${u.login}</td>
                                        <td>${u.nome}</td>
                                        <td>${u.email || '-'}</td>
                                        <td>${u.tipo || '-'}</td>
                                        <td>
                                            <span class="status-badge ${u.ativo === 'S' ? 'status-ativo' : 'status-inativo'}">
                                                ${u.ativo === 'S' ? 'Ativo' : 'Inativo'}
                                            </span>
                                        </td>
                                        <td class="action-buttons">
                                            <button class="btn btn-danger btn-sm" 
                                                    onclick="deleteUsuario(${u.id})">🗑️</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;

                document.getElementById('usuarios-container').innerHTML = html;

            } catch (error) {
                document.getElementById('usuarios-container').innerHTML = 
                    `<div class="error-message">Erro: ${error.message}</div>`;
            }
        }

        function openUsuarioModal() {
            openModal('Novo Usuário');
            document.getElementById('modal-body').innerHTML = `
                <form onsubmit="saveUsuario(event)">
                    <div class="form-group">
                        <label>Login *</label>
                        <input type="text" name="login" required>
                    </div>
                    <div class="form-group">
                        <label>Senha *</label>
                        <input type="password" name="senha" required>
                    </div>
                    <div class="form-group">
                        <label>Nome *</label>
                        <input type="text" name="nome" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email">
                    </div>
                    <div class="form-group">
                        <label>Tipo</label>
                        <select name="tipo">
                            <option value="A">Administrador</option>
                            <option value="U">Usuário</option>
                            <option value="T">Técnico</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        ➕ Criar Usuário
                    </button>
                </form>
            `;
        }

        async function saveUsuario(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData);

            try {
                const response = await fetch(`${API_INFOS}/usuarios`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('Usuário criado!');
                    closeModal();
                    loadUsuarios();
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                showMessage('Erro: ' + error.message, 'error');
            }
        }

        async function deleteUsuario(id) {
            if (!confirm('Deletar usuário?')) return;

            try {
                const response = await fetch(`${API_INFOS}/usuarios/${id}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('Usuário deletado!');
                    loadUsuarios();
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                showMessage('Erro: ' + error.message, 'error');
            }
        }

        // ============================================
        // PAGINAÇÃO
        // ============================================

        function displayPagination(pagination, entity) {
            const html = `
                <button onclick="load${entity.charAt(0).toUpperCase() + entity.slice(1)}(${pagination.page - 1})" 
                        ${pagination.page === 1 ? 'disabled' : ''}>
                    ← Anterior
                </button>
                <span>Página ${pagination.page} de ${pagination.pages}</span>
                <button onclick="load${entity.charAt(0).toUpperCase() + entity.slice(1)}(${pagination.page + 1})" 
                        ${pagination.page === pagination.pages ? 'disabled' : ''}>
                    Próxima →
                </button>
            `;

            document.getElementById(`${entity}-pagination`).innerHTML = html;
        }

        // ============================================
        // INICIALIZAÇÃO
        // ============================================

        window.onload = function() {
            loadLeads();
        };

        // Fechar modal ao clicar fora
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                closeModal();
            }
        };
    </script>
</body>
