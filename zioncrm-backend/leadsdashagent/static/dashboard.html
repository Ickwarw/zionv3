<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zion Export - Dashboard de Monitoramento</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        h1 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #999;
            font-size: 0.9em;
        }

        .refresh-info {
            float: right;
            color: #666;
            font-size: 0.85em;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-connected { background: #10b981; }
        .status-disconnected { background: #ef4444; }
        .status-running { background: #3b82f6; }
        .status-stopped { background: #6b7280; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f3f4f6;
        }

        .card-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #1f2937;
        }

        .card-icon {
            font-size: 2em;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f3f4f6;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #6b7280;
            font-size: 0.9em;
        }

        .stat-value {
            font-weight: 600;
            color: #1f2937;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-error { background: #fee2e2; color: #991b1b; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-info { background: #dbeafe; color: #1e40af; }

        .logs-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .log-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: #f3f4f6;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .filter-btn:hover {
            background: #e5e7eb;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .logs-container {
            max-height: 500px;
            overflow-y: auto;
            background: #f9fafb;
            border-radius: 8px;
            padding: 15px;
        }

        .log-entry {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            background: white;
            border-left: 4px solid #e5e7eb;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
        }

        .log-DEBUG { border-left-color: #6b7280; }
        .log-INFO { border-left-color: #3b82f6; }
        .log-WARNING { border-left-color: #f59e0b; }
        .log-ERROR { border-left-color: #ef4444; }
        .log-CRITICAL { border-left-color: #dc2626; background: #fef2f2; }

        .log-timestamp {
            color: #6b7280;
            font-size: 0.9em;
        }

        .log-export {
            color: #8b5cf6;
            font-weight: 600;
        }

        .log-level {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            margin: 0 8px;
        }

        .level-DEBUG { background: #f3f4f6; color: #6b7280; }
        .level-INFO { background: #dbeafe; color: #1e40af; }
        .level-WARNING { background: #fef3c7; color: #92400e; }
        .level-ERROR { background: #fee2e2; color: #991b1b; }
        .level-CRITICAL { background: #fecaca; color: #7f1d1d; }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .table-stats {
            margin-top: 15px;
        }

        .table-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.9em;
            border-bottom: 1px solid #f3f4f6;
        }

        .table-name {
            color: #667eea;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.5em;
            }
            
            .refresh-info {
                float: none;
                display: block;
                margin-top: 10px;
            }
        }

        .metric-card {
            text-align: center;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .metric-value {
            font-size: 2.5em;
            font-weight: bold;
            margin: 10px 0;
        }

        .metric-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔄 Zion Export - Dashboard de Monitoramento</h1>
            <p class="subtitle">Sincronização em tempo real: MariaDB → PostgreSQL</p>
            <div class="refresh-info">
                <span id="last-update">Carregando...</span> | 
                <span id="auto-refresh">Atualização automática: 5s</span>
            </div>
        </header>

        <!-- Conectividade -->
        <div class="grid">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">🗄️ MariaDB</span>
                    <span class="card-icon">🔌</span>
                </div>
                <div id="mysql-status">
                    <div class="loading">Carregando...</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span class="card-title">🐘 PostgreSQL</span>
                    <span class="card-icon">🔌</span>
                </div>
                <div id="postgres-status">
                    <div class="loading">Carregando...</div>
                </div>
            </div>
        </div>

        <!-- Exportações -->
        <div class="grid" id="exports-grid">
            <!-- Cards de exportação serão inseridos aqui via JavaScript -->
        </div>

        <!-- Logs -->
        <div class="logs-section">
            <div class="card-header">
                <span class="card-title">📋 Logs do Sistema</span>
                <button class="filter-btn" onclick="refreshLogs()">🔄 Atualizar</button>
            </div>

            <div class="log-filters">
                <button class="filter-btn active" data-level="ALL" onclick="filterLogs('ALL')">Todos</button>
                <button class="filter-btn" data-level="INFO" onclick="filterLogs('INFO')">Info</button>
                <button class="filter-btn" data-level="WARNING" onclick="filterLogs('WARNING')">Avisos</button>
                <button class="filter-btn" data-level="ERROR" onclick="filterLogs('ERROR')">Erros</button>
                <button class="filter-btn" data-level="CRITICAL" onclick="filterLogs('CRITICAL')">Críticos</button>
            </div>

            <div class="logs-container" id="logs-container">
                <div class="loading">Carregando logs...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        let currentLogFilter = 'ALL';
        let autoRefreshInterval;

        // Formata timestamp
        function formatTimestamp(isoString) {
            if (!isoString) return 'N/A';
            const date = new Date(isoString);
            return date.toLocaleString('pt-BR');
        }

        // Formata duração
        function formatDuration(seconds) {
            if (!seconds) return 'N/A';
            if (seconds < 1) return `${(seconds * 1000).toFixed(0)}ms`;
            if (seconds < 60) return `${seconds.toFixed(2)}s`;
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}m ${secs}s`;
        }

        // Formata números
        function formatNumber(num) {
            if (!num && num !== 0) return 'N/A';
            return num.toLocaleString('pt-BR');
        }

        // Atualiza status do MySQL
        async function updateMySQLStatus() {
            try {
                const response = await fetch(`${API_URL}/connectivity/mysql`);
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.error);
                }

                const data = result.data;
                const isConnected = data.status === 'connected';
                
                const html = `
                    <div class="stat-row">
                        <span class="stat-label">Status</span>
                        <span class="stat-value">
                            <span class="status-indicator ${isConnected ? 'status-connected' : 'status-disconnected'}"></span>
                            ${isConnected ? 'Conectado' : 'Desconectado'}
                        </span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Última verificação</span>
                        <span class="stat-value">${formatTimestamp(data.last_check)}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Tempo de resposta</span>
                        <span class="stat-value">${data.avg_response_time ? (data.avg_response_time * 1000).toFixed(2) + 'ms' : 'N/A'}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Verificações OK</span>
                        <span class="stat-value">${data.successful_checks || 0} / ${data.total_checks || 0}</span>
                    </div>
                    ${!isConnected && data.last_error ? `
                        <div class="stat-row">
                            <span class="stat-label">Último erro</span>
                            <span class="stat-value" style="color: #ef4444; font-size: 0.85em;">
                                ${data.last_error.message || 'Erro desconhecido'}
                            </span>
                        </div>
                    ` : ''}
                `;
                
                document.getElementById('mysql-status').innerHTML = html;
            } catch (error) {
                document.getElementById('mysql-status').innerHTML = `
                    <div class="error-message">Erro ao carregar status: ${error.message}</div>
                `;
            }
        }

        // Atualiza status do PostgreSQL
        async function updatePostgresStatus() {
            try {
                const response = await fetch(`${API_URL}/connectivity/postgres`);
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.error);
                }

                const data = result.data;
                const isConnected = data.status === 'connected';
                
                const html = `
                    <div class="stat-row">
                        <span class="stat-label">Status</span>
                        <span class="stat-value">
                            <span class="status-indicator ${isConnected ? 'status-connected' : 'status-disconnected'}"></span>
                            ${isConnected ? 'Conectado' : 'Desconectado'}
                        </span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Última verificação</span>
                        <span class="stat-value">${formatTimestamp(data.last_check)}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Tempo de resposta</span>
                        <span class="stat-value">${data.avg_response_time ? (data.avg_response_time * 1000).toFixed(2) + 'ms' : 'N/A'}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Verificações OK</span>
                        <span class="stat-value">${data.successful_checks || 0} / ${data.total_checks || 0}</span>
                    </div>
                    ${!isConnected && data.last_error ? `
                        <div class="stat-row">
                            <span class="stat-label">Último erro</span>
                            <span class="stat-value" style="color: #ef4444; font-size: 0.85em;">
                                ${data.last_error.message || 'Erro desconhecido'}
                            </span>
                        </div>
                    ` : ''}
                `;
                
                document.getElementById('postgres-status').innerHTML = html;
            } catch (error) {
                document.getElementById('postgres-status').innerHTML = `
                    <div class="error-message">Erro ao carregar status: ${error.message}</div>
                `;
            }
        }

        // Atualiza exportações
        async function updateExports() {
            try {
                const response = await fetch(`${API_URL}/exports`);
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.error);
                }

                const exports = result.data;
                const container = document.getElementById('exports-grid');
                
                if (Object.keys(exports).length === 0) {
                    container.innerHTML = '<div class="card"><p>Nenhuma exportação em andamento</p></div>';
                    return;
                }

                let html = '';
                
                for (const [name, data] of Object.entries(exports)) {
                    const isRunning = data.status === 'running';
                    const tables = data.tables || {};
                    const tableCount = Object.keys(tables).length;
                    
                    html += `
                        <div class="card">
                            <div class="card-header">
                                <span class="card-title">📦 ${name}</span>
                                <span class="badge ${isRunning ? 'badge-info' : 'badge-warning'}">
                                    ${isRunning ? 'Rodando' : 'Parado'}
                                </span>
                            </div>
                            
                            <div class="metric-card">
                                <div class="metric-label">Total de Registros</div>
                                <div class="metric-value">${formatNumber(data.total_records)}</div>
                            </div>
                            
                            <div class="stat-row">
                                <span class="stat-label">Última sincronização</span>
                                <span class="stat-value">${formatTimestamp(data.last_sync)}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">Total de ciclos</span>
                                <span class="stat-value">${formatNumber(data.total_syncs)}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">Erros totais</span>
                                <span class="stat-value ${data.total_errors > 0 ? 'badge-error' : ''}">${formatNumber(data.total_errors)}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">Ciclo atual</span>
                                <span class="stat-value">#${data.current_cycle || 0}</span>
                            </div>
                            
                            ${tableCount > 0 ? `
                                <div class="table-stats">
                                    <strong style="color: #6b7280; font-size: 0.9em;">Tabelas (${tableCount}):</strong>
                                    ${Object.entries(tables).slice(0, 5).map(([tableName, tableData]) => `
                                        <div class="table-row">
                                            <span class="table-name">${tableName}</span>
                                            <span>${formatNumber(tableData.total_records)} reg.</span>
                                        </div>
                                    `).join('')}
                                    ${tableCount > 5 ? `<div style="text-align: center; color: #6b7280; font-size: 0.85em; margin-top: 5px;">+${tableCount - 5} mais...</div>` : ''}
                                </div>
                            ` : ''}
                        </div>
                    `;
                }
                
                container.innerHTML = html;
            } catch (error) {
                document.getElementById('exports-grid').innerHTML = `
                    <div class="card">
                        <div class="error-message">Erro ao carregar exportações: ${error.message}</div>
                    </div>
                `;
            }
        }

        // Atualiza logs
        async function updateLogs() {
            try {
                const level = currentLogFilter === 'ALL' ? null : currentLogFilter;
                const url = level ? `${API_URL}/logs?level=${level}&limit=100` : `${API_URL}/logs?limit=100`;
                
                const response = await fetch(url);
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.error);
                }

                const logs = result.data;
                const container = document.getElementById('logs-container');
                
                if (logs.length === 0) {
                    container.innerHTML = '<div class="loading">Nenhum log disponível</div>';
                    return;
                }

                const html = logs.reverse().map(log => `
                    <div class="log-entry log-${log.level}">
                        <span class="log-timestamp">${formatTimestamp(log.timestamp)}</span>
                        <span class="log-level level-${log.level}">${log.level}</span>
                        <span class="log-export">[${log.export}]</span>
                        <span class="log-message">${log.message}</span>
                    </div>
                `).join('');
                
                container.innerHTML = html;
                
                // Auto-scroll para o topo (logs mais recentes)
                container.scrollTop = 0;
            } catch (error) {
                document.getElementById('logs-container').innerHTML = `
                    <div class="error-message">Erro ao carregar logs: ${error.message}</div>
                `;
            }
        }

        // Filtra logs
        function filterLogs(level) {
            currentLogFilter = level;
            
            // Atualiza botões ativos
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-level="${level}"]`).classList.add('active');
            
            updateLogs();
        }

        // Refresh manual de logs
        function refreshLogs() {
            updateLogs();
        }

        // Atualiza timestamp de última atualização
        function updateLastUpdateTime() {
            document.getElementById('last-update').textContent = 
                'Última atualização: ' + new Date().toLocaleTimeString('pt-BR');
        }

        // Atualiza tudo
        async function updateAll() {
            updateLastUpdateTime();
            await Promise.all([
                updateMySQLStatus(),
                updatePostgresStatus(),
                updateExports(),
                updateLogs()
            ]);
        }

        // Inicia auto-refresh
        function startAutoRefresh() {
            updateAll(); // Atualização inicial
            autoRefreshInterval = setInterval(updateAll, 5000); // A cada 5 segundos
        }

        // Inicia quando a página carregar
        window.addEventListener('load', startAutoRefresh);
        
        // Para o refresh quando sair da página
        window.addEventListener('beforeunload', () => {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
        });
    </script>
</body>
</html>
